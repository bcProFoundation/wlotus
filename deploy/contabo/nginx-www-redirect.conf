# Optional snippet: force www.wlotus.org → https://wlotus.org
#
# Use when Certbot already manages TLS and the main site file must not be
# overwritten. Paste into /etc/nginx/sites-available/wlotus (or a new file
# under sites-available + symlink), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisite DNS:
#   A  @    → prod Contabo IPv4
#   A  www  → same IPv4
# Certificate must include www (certbot -d wlotus.org -d www.wlotus.org).

server {
    listen 80;
    listen [::]:80;
    server_name www.wlotus.org;
    return 301 https://wlotus.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.wlotus.org;

    # Paths from `certbot certificates` for wlotus.org — adjust if different:
    ssl_certificate     /etc/letsencrypt/live/wlotus.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wlotus.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://wlotus.org$request_uri;
}
