# Nginx site for WLotus offerings SPA (production).
#
# IMPORTANT: Do NOT blindly overwrite a Certbot-managed site with this file.
# If HTTPS already works, only merge the /api/ and /health location blocks
# into the existing server { } that listens on 443, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Fresh HTTP-only install:
#   sudo cp deploy/contabo/nginx-wlotus-prod.conf /etc/nginx/sites-available/wlotus
#   sudo ln -sfn /etc/nginx/sites-available/wlotus /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then TLS:
#   sudo certbot --nginx -d wlotus.org -d www.wlotus.org
#
# Replace server_name if needed.

server {
    listen 80;
    listen [::]:80;
    server_name wlotus.org www.wlotus.org;

    root /var/www/wlotus;
    index index.html;

    # Mint API — run on localhost:8787
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

# After `certbot --nginx`, Certbot adds a second server { listen 443 ssl; ... }.
# Copy the same /api/ and /health locations into THAT block as well.
