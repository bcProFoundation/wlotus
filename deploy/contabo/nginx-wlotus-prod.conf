# Nginx site for WLotus offerings SPA (production).
#
# IMPORTANT: HTTP-only template for first bootstrap. Do NOT overwrite a live
# Certbot site with this file (bootstrap-prod.sh skips when TLS is present).
# If apex HTTPS 301-loops to itself, install nginx-wlotus-prod-tls.conf instead.
#
# Fresh HTTP-only install:
#   sudo cp deploy/contabo/nginx-wlotus-prod.conf /etc/nginx/sites-available/wlotus
#   sudo ln -sfn /etc/nginx/sites-available/wlotus /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then TLS (both names; cert covers redirect + apex):
#   sudo certbot --nginx -d wlotus.org -d www.wlotus.org
# Prefer nginx-wlotus-prod-tls.conf after that for a clean apex + www layout.
#
# DNS (required for www to reach this host before redirect):
#   A    @     → Contabo IPv4
#   A    www   → same IPv4   (or CNAME www → wlotus.org.)

# www → apex (HTTP). After certbot, ensure a matching 443 block also redirects.
server {
    listen 80;
    listen [::]:80;
    server_name www.wlotus.org;
    return 301 https://wlotus.org$request_uri;
}

# Apex — HTTP. Certbot will add listen 443 ssl and rewrite this to redirect
# HTTP→HTTPS; keep /api and SPA locations on the HTTPS apex server.
server {
    listen 80;
    listen [::]:80;
    server_name wlotus.org;

    root /var/www/wlotus;
    index index.html;

    # Mint API — run on localhost:8787
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}

# After certbot, you should also have (or add) HTTPS www → apex:
#
# server {
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     server_name www.wlotus.org;
#     # ssl_certificate …  (same cert as apex if -d includes www)
#     return 301 https://wlotus.org$request_uri;
# }
