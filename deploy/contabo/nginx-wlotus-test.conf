# Nginx site for WLotus offerings SPA (test).
# Install: copy to /etc/nginx/sites-available/wlotus-test
# Enable:  ln -s /etc/nginx/sites-available/wlotus-test /etc/nginx/sites-enabled/
# Then:    nginx -t && systemctl reload nginx
#
# Replace server_name with your test host (IP, or test.wlotus.org).
# After DNS points here, run: certbot --nginx -d test.wlotus.org

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/wlotus-test;
    index index.html;

    # Mint API (dual-mint Prayer offer) — run on localhost:8787
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
    }

    # SPA: client-side routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets; keep HTML fresh
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
