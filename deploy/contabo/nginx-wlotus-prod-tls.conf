# Full TLS site for wlotus.org (recovery / post-Certbot reference).
#
# Use when HTTPS apex redirects to itself (301 loop) after a bootstrap overwrite,
# or when you need a known-good apex + www config with Let's Encrypt paths.
#
#   sudo cp /etc/nginx/sites-available/wlotus /etc/nginx/sites-available/wlotus.bak
#   sudo cp deploy/contabo/nginx-wlotus-prod-tls.conf /etc/nginx/sites-available/wlotus
#   # Adjust ssl paths if `sudo certbot certificates` shows a different live/ name
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -sI https://wlotus.org/ | head -5          # expect 200
#   curl -sI https://www.wlotus.org/ | head -5      # expect 301 → https://wlotus.org/
#
# Do NOT re-run bootstrap-prod.sh over this file (bootstrap skips TLS sites).

# HTTP → HTTPS apex (both names)
server {
    listen 80;
    listen [::]:80;
    server_name wlotus.org www.wlotus.org;
    return 301 https://wlotus.org$request_uri;
}

# HTTPS www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.wlotus.org;

    ssl_certificate     /etc/letsencrypt/live/wlotus.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wlotus.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://wlotus.org$request_uri;
}

# HTTPS apex — SPA + mint-api proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wlotus.org;

    ssl_certificate     /etc/letsencrypt/live/wlotus.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wlotus.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/wlotus;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
