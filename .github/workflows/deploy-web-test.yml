# Build apps/web and rsync to the Contabo test VM.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CONTABO_HOST              — VM IP or hostname
#   CONTABO_USER              — SSH user (e.g. root or deploy)
#   CONTABO_SSH_PRIVATE_KEY   — private key (full PEM) with access to the VM
#
# Optional secrets:
#   CONTABO_SSH_PORT          — default 22
#   CONTABO_DEPLOY_PATH       — default /var/www/wlotus-test
#   VITE_PRAYER_TOKEN_ID      — bake into the SPA at build time
#   VITE_PRAYER_TICKER        — default dPRAYER
#   VITE_CHRONIK_URLS         — comma-separated Chronik URLs
#   VITE_TIP_POLL_MS          — tip-epoch poll while mining (ms); prefer Actions *variable*
#                               (not sensitive). e.g. 1000 or 5000; app default 2000
#   MINT_MNEMONIC             — 12/24-word fee wallet; synced to /etc/wlotus/mint.env
#                               (mint-api runtime still reads the server file, not Actions)
#
# One-time VM setup: see deploy/contabo/README.md

name: Deploy web (test)

on:
  # Manual run — still must be from master (see job `if`)
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'apps/web/**'
      - 'apps/mint-api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web-test.yml'
      - 'deploy/contabo/**'

concurrency:
  group: deploy-web-test
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build web
        env:
          VITE_PRAYER_TOKEN_ID: ${{ secrets.VITE_PRAYER_TOKEN_ID }}
          VITE_PRAYER_TICKER: ${{ secrets.VITE_PRAYER_TICKER }}
          VITE_CHRONIK_URLS: ${{ secrets.VITE_CHRONIK_URLS }}
          # Tip-epoch poll while mining (ms). Prefer Actions variable; secret also ok.
          # Examples: 1000 (1s) or 5000 (5s). Default in app is 2000 if unset.
          VITE_TIP_POLL_MS: ${{ vars.VITE_TIP_POLL_MS || secrets.VITE_TIP_POLL_MS }}
        run: npm run web:build

      - name: Require Contabo secrets
        env:
          CONTABO_HOST: ${{ secrets.CONTABO_HOST }}
          CONTABO_USER: ${{ secrets.CONTABO_USER }}
          CONTABO_SSH_PRIVATE_KEY: ${{ secrets.CONTABO_SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for name in CONTABO_HOST CONTABO_USER CONTABO_SSH_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name secret is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        env:
          CONTABO_HOST: ${{ secrets.CONTABO_HOST }}
          CONTABO_SSH_PORT: ${{ secrets.CONTABO_SSH_PORT }}
        run: |
          PORT="${CONTABO_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$CONTABO_HOST" >> ~/.ssh/known_hosts

      - name: Rsync dist to Contabo
        env:
          CONTABO_HOST: ${{ secrets.CONTABO_HOST }}
          CONTABO_USER: ${{ secrets.CONTABO_USER }}
          CONTABO_SSH_PORT: ${{ secrets.CONTABO_SSH_PORT }}
          CONTABO_DEPLOY_PATH: ${{ secrets.CONTABO_DEPLOY_PATH }}
        run: |
          PORT="${CONTABO_SSH_PORT:-22}"
          DEST="${CONTABO_DEPLOY_PATH:-/var/www/wlotus-test}"
          rsync -avz --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=yes" \
            apps/web/dist/ \
            "${CONTABO_USER}@${CONTABO_HOST}:${DEST}/"

      - name: Sync mint fee wallet env (optional)
        env:
          CONTABO_HOST: ${{ secrets.CONTABO_HOST }}
          CONTABO_USER: ${{ secrets.CONTABO_USER }}
          CONTABO_SSH_PORT: ${{ secrets.CONTABO_SSH_PORT }}
          MINT_MNEMONIC: ${{ secrets.MINT_MNEMONIC }}
        run: |
          if [ -z "$MINT_MNEMONIC" ]; then
            echo "MINT_MNEMONIC not set — leave /etc/wlotus/mint.env unchanged"
            exit 0
          fi
          PORT="${CONTABO_SSH_PORT:-22}"
          ssh -p "$PORT" "${CONTABO_USER}@${CONTABO_HOST}" \
            'sudo mkdir -p /etc/wlotus'
          # Do not echo mnemonic into Actions logs
          printf 'MINT_MNEMONIC=%s\nMINT_API_PORT=8787\n' "$MINT_MNEMONIC" | \
            ssh -p "$PORT" "${CONTABO_USER}@${CONTABO_HOST}" \
              'sudo tee /etc/wlotus/mint.env > /dev/null && sudo chmod 600 /etc/wlotus/mint.env'
          ssh -p "$PORT" "${CONTABO_USER}@${CONTABO_HOST}" \
            'sudo systemctl try-restart wlotus-mint-api.service || true'
          echo "Synced /etc/wlotus/mint.env and attempted mint-api restart"

      - name: Smoke check (optional HTTP)
        env:
          CONTABO_SMOKE_URL: ${{ secrets.CONTABO_SMOKE_URL }}
        run: |
          if [ -z "$CONTABO_SMOKE_URL" ]; then
            echo "CONTABO_SMOKE_URL not set — skip smoke check"
            exit 0
          fi
          curl -fsSL --retry 5 --retry-delay 2 "$CONTABO_SMOKE_URL" | head -c 200
          echo
          echo "Smoke OK: $CONTABO_SMOKE_URL"
